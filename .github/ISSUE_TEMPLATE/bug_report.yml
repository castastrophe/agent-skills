name: Bug Report
description: Something isn't working correctly in an existing skill or the project tooling.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project is affected?
      options:
        - "Skill: gh-notification-summary"
        - "Tooling / scripts"
        - "CI / GitHub Actions"
        - "npm package / install"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `yarn test`, the coverage report for gh-notification-summary is always empty."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the issue.
      placeholder: |
        1. Clone the repo
        2. Run `yarn test`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v24.0.0"
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13.2"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
